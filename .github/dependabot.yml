version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      # ESLint 10 is not yet supported by eslint-config-next
      - dependency-name: eslint
        versions: ["10.x", ">=10"]
    groups:
      dev-dependencies:
        dependency-type: development
      next-ecosystem:
        patterns:
          - next
          - react
          - react-dom
          - "@types/react*"
          - eslint-config-next
